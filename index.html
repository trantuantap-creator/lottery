<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>宝贝の幸运大转盘 ✨</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(ellipse at top, #ff7ab8 0%, #8a2be2 35%, #2b0050 75%, #0d0028 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px 60px;
    position: relative;
  }

  /* 极光雾团：3 块超大模糊彩云缓慢漂移 */
  .nebula {
    position: fixed;
    inset: -10vh -10vw;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .nebula i {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    mix-blend-mode: screen;
    will-change: transform;
  }
  .nebula i:nth-child(1) {
    width: 65vw; height: 65vw;
    top: -15vw; left: -15vw;
    background: radial-gradient(circle, #ff6fa8 0%, rgba(255,111,168,0) 65%);
    animation: nebDrift1 26s ease-in-out infinite;
  }
  .nebula i:nth-child(2) {
    width: 55vw; height: 55vw;
    bottom: -10vw; right: -10vw;
    background: radial-gradient(circle, #6fc8ff 0%, rgba(111,200,255,0) 65%);
    animation: nebDrift2 32s ease-in-out infinite;
  }
  .nebula i:nth-child(3) {
    width: 50vw; height: 50vw;
    top: 35%; left: 30%;
    background: radial-gradient(circle, #ffc97a 0%, rgba(255,201,122,0) 65%);
    animation: nebDrift3 38s ease-in-out infinite;
  }
  @keyframes nebDrift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(18vw, 14vh) scale(1.15); }
  }
  @keyframes nebDrift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(-14vw, -18vh) scale(1.12); }
  }
  @keyframes nebDrift3 {
    0%, 100% { transform: translate(0, 0) scale(0.92); }
    50%      { transform: translate(-12vw, 12vh) scale(1.22); }
  }

  /* 地平线辉光：底部一层柔粉光晕 */
  .horizon-glow {
    position: fixed;
    bottom: -28vh;
    left: 50%;
    transform: translateX(-50%);
    width: 160vw;
    height: 60vh;
    background:
      radial-gradient(ellipse at center,
        rgba(255, 142, 200, 0.55) 0%,
        rgba(255, 142, 200, 0.18) 30%,
        rgba(255, 142, 200, 0)    62%);
    filter: blur(25px);
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: screen;
  }

  /* 流星 */
  .ss-wrap {
    position: fixed;
    top: 0;
    left: -5vw;
    z-index: 1;
    pointer-events: none;
    width: 0;
    transform-origin: left center;
  }
  .ss {
    width: 140px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,0.5) 55%,
      #fff 100%);
    filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 10px #ffd1f2);
    transform: translateX(-220px);
    animation: ssMove 1.4s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes ssMove {
    0%   { transform: translateX(-220px); opacity: 0; }
    18%  { opacity: 1; }
    100% { transform: translateX(120vw); opacity: 0; }
  }

  /* 背景星星 */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 4s infinite;
    box-shadow: 0 0 8px #fff, 0 0 14px #ffd1f2;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* 飘浮爱心 */
  .heart {
    position: absolute;
    color: #ff6fa8;
    font-size: 22px;
    animation: floatUp linear forwards;
    text-shadow: 0 0 10px #ff6fa8;
    user-select: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
  }

  header {
    text-align: center;
    margin-bottom: 18px;
    z-index: 2;
  }
  h1 {
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #fff1a8, #ff8ec8, #c19bff, #fff1a8);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 4s linear infinite;
    filter: drop-shadow(0 4px 18px rgba(255, 142, 200, 0.6));
  }
  @keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: #ffd9ee;
    opacity: 0.9;
  }

  /* 转盘容器 */
  .wheel-wrapper {
    position: relative;
    width: min(92vw, 460px);
    aspect-ratio: 1 / 1;
    margin: 18px 0 26px;
    z-index: 2;
    filter: drop-shadow(0 18px 40px rgba(255, 100, 180, 0.45));
  }
  /* 外圈装饰光环 */
  .wheel-wrapper::before {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ffd86b, #ff5fa2, #b362ff, #5ec8ff, #ffd86b);
    filter: blur(6px);
    animation: spinHalo 10s linear infinite;
    z-index: -1;
  }
  @keyframes spinHalo { to { transform: rotate(360deg); } }

  .wheel-frame {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #fff7d6 0%, #ffd86b 40%, #c98a14 100%);
    padding: 10px;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.25),
      0 0 30px rgba(255, 216, 107, 0.6);
  }
  .wheel {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    transition: transform 6s cubic-bezier(0.17, 0.67, 0.16, 1);
    transform: rotate(0deg);
    overflow: hidden;
    box-shadow:
      inset 0 0 0 4px #fff8d8,
      inset 0 0 0 6px #b97500;
  }
  .wheel svg { width: 100%; height: 100%; display: block; }
  .wheel text {
    font-family: -apple-system, "PingFang SC", sans-serif;
    font-weight: 800;
    fill: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  /* 灯泡 */
  .bulbs {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .bulb {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fffbe6;
    box-shadow: 0 0 8px #fff, 0 0 14px #ffd86b;
    top: 50%; left: 50%;
    transform-origin: 0 0;
    animation: bulbBlink 1s infinite;
  }
  @keyframes bulbBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* 指针 */
  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    width: 56px;
    height: 78px;
    z-index: 5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    transform: translateX(-50%) rotate(0deg);
    transform-origin: 50% 28%;
  }
  .pointer svg { width: 100%; height: 100%; }
  /* 转盘扇区切换时，指针被拨一下再弹回来 */
  @keyframes pointerKick {
    0%   { transform: translateX(-50%) rotate(0deg); }
    25%  { transform: translateX(-50%) rotate(18deg); }
    55%  { transform: translateX(-50%) rotate(-6deg); }
    80%  { transform: translateX(-50%) rotate(3deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }
  .pointer.kick { animation: pointerKick 0.26s cubic-bezier(.34,1.56,.64,1); }

  /* 中心按钮 */
  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 28%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #ffe17a, #ff6fa8 50%, #c0247c 100%);
    color: #fff;
    font-weight: 900;
    font-size: clamp(16px, 3.6vw, 22px);
    letter-spacing: 2px;
    box-shadow:
      0 0 0 4px #fff8d8,
      0 0 0 6px #b97500,
      0 10px 30px rgba(255, 100, 180, 0.7),
      inset 0 -6px 12px rgba(0,0,0,0.2),
      inset 0 4px 10px rgba(255,255,255,0.5);
    transition: transform 0.15s;
    z-index: 4;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    animation: pulse 1.6s infinite;
  }
  .spin-btn:active { transform: translate(-50%, -50%) scale(0.94); }
  .spin-btn:disabled {
    cursor: not-allowed;
    filter: grayscale(0.6) brightness(0.7);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px #fff8d8, 0 0 0 6px #b97500, 0 10px 30px rgba(255, 100, 180, 0.7), inset 0 -6px 12px rgba(0,0,0,0.2), inset 0 4px 10px rgba(255,255,255,0.5); }
    50%      { box-shadow: 0 0 0 4px #fff8d8, 0 0 0 6px #b97500, 0 0 50px rgba(255, 200, 80, 1), inset 0 -6px 12px rgba(0,0,0,0.2), inset 0 4px 10px rgba(255,255,255,0.5); }
  }

  /* 信息条 */
  .info {
    z-index: 2;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    color: #fff;
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 16px;
  }
  .info b { color: #ffd86b; font-weight: 800; }
  .info .sep { margin: 0 4px; opacity: 0.5; }
  .today-result b { color: #ff8ec8; }

  /* 奖品列表 */
  .prize-list {
    z-index: 2;
    width: min(92vw, 460px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 18px 16px 16px;
    margin-top: 8px;
  }
  .prize-list h3 {
    font-size: 15px;
    color: #ffd86b;
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 1px;
  }
  .prize-list ul {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 380px) {
    .prize-list ul { grid-template-columns: repeat(2, 1fr); }
  }
  .prize-card {
    position: relative;
    background: linear-gradient(135deg, var(--c1, #ff8ac0), var(--c2, #c0247c));
    border-radius: 14px;
    padding: 14px 6px 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    box-shadow:
      0 6px 16px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -2px 6px rgba(0,0,0,0.15);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    overflow: hidden;
    cursor: default;
  }
  .prize-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 45%);
    pointer-events: none;
  }
  .prize-card:hover {
    transform: translateY(-4px) scale(1.04);
    box-shadow:
      0 12px 22px rgba(0,0,0,0.32),
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -2px 6px rgba(0,0,0,0.15);
  }
  .prize-card .prize-emoji {
    font-size: 30px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .prize-card:hover .prize-emoji {
    transform: scale(1.18) rotate(-8deg);
  }
  .prize-card .prize-name {
    font-size: 12px;
    color: #fff;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    letter-spacing: 0.5px;
  }
  .prize-card.rare::after {
    content: '✨';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 11px;
    animation: rareTwinkle 1.8s ease-in-out infinite;
  }
  @keyframes rareTwinkle {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.25); }
  }

  /* 弹窗 */
  .modal-mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-mask.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(160deg, #fff5fb, #ffe5f1);
    color: #5a1740;
    padding: 36px 28px 28px;
    border-radius: 24px;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 0 0 2px #ffd86b;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal .emoji {
    font-size: 64px;
    margin-bottom: 8px;
    display: inline-block;
    animation: bounce 1.2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .modal h2 {
    font-size: 26px;
    margin-bottom: 8px;
    color: #c0247c;
    letter-spacing: 1px;
  }
  .modal p {
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 18px;
    color: #6e2a55;
  }
  .modal .prize-name {
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff6fa8, #c0247c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 8px 0 16px;
  }
  .modal button {
    background: linear-gradient(135deg, #ff6fa8, #c0247c);
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(192, 36, 124, 0.4);
    transition: transform 0.15s;
  }
  .modal button:active { transform: scale(0.95); }
  .modal .hug-btn {
    background: linear-gradient(135deg, #ffd86b, #ff8a4a);
    box-shadow: 0 8px 20px rgba(255, 138, 74, 0.4);
  }
  .love-letter p {
    font-family: "Kaiti SC", "STKaiti", serif;
    color: #6e2a55 !important;
  }

  /* 二级菜单（奶茶/烧烤/蛋糕） */
  .sub-menu {
    margin: 4px 0 8px;
    padding: 12px;
    background: rgba(255, 230, 243, 0.4);
    border-radius: 12px;
    border: 1px dashed #f0a8c8;
  }
  .menu-title {
    font-size: 13px !important;
    color: #c0247c !important;
    margin-bottom: 10px !important;
    font-weight: 600;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .chip {
    padding: 6px 12px;
    border-radius: 999px;
    background: #fff;
    border: 1.5px solid #ffb8d6;
    color: #c0247c;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:active { transform: scale(0.92); }
  .chip.selected {
    background: linear-gradient(135deg, #ff6fa8, #c0247c);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 10px rgba(192, 36, 124, 0.3);
  }
  .chip-saved {
    text-align: center;
    color: #c0247c;
    font-size: 12px;
    margin-top: 6px;
    font-weight: 600;
  }
  .chip-input-wrap {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    justify-content: center;
  }
  .chip-input-wrap input {
    flex: 1;
    max-width: 180px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1.5px solid #ffb8d6;
    background: #fff;
    font-size: 13px;
    color: #6e2a55;
    outline: none;
    transition: border-color 0.15s;
  }
  .chip-input-wrap input:focus { border-color: #ff6fa8; }
  .chip-input-wrap button {
    padding: 6px 14px !important;
    font-size: 13px !important;
    letter-spacing: 0 !important;
    background: linear-gradient(135deg, #ffd86b, #ff8a4a) !important;
    box-shadow: 0 4px 10px rgba(255, 138, 74, 0.3) !important;
  }

  /* 鼠标轨迹爱心 */
  .trail {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 18px;
    user-select: none;
    animation: trailFly 1.4s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes trailFly {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
    100% { transform: translate(-50%, -180%) scale(1.4) rotate(20deg); opacity: 0; }
  }

  /* 大爱心爆炸 */
  .boom {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    font-size: 28px;
    user-select: none;
    animation: boomFly 2.2s ease-out forwards;
  }
  @keyframes boomFly {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px))) scale(1.4); opacity: 0; }
  }

  /* 彩带 */
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px; height: 16px;
    z-index: 99;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* 静音按钮 */
  .mute-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s;
  }
  .mute-btn:hover { background: rgba(255,255,255,0.2); }
  .mute-btn:active { transform: scale(0.9); }

  .music-btn {
    position: fixed;
    top: 18px;
    right: 72px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s, opacity 0.2s;
    opacity: 0.6;
  }
  .music-btn.on { opacity: 1; background: rgba(255,200,80,0.25); }
  .music-btn:hover { background: rgba(255,255,255,0.2); }
  .music-btn:active { transform: scale(0.9); }

  /* 背景音乐曲目提示 */
  .track-toast {
    position: fixed;
    top: 68px;
    right: 50px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    padding: 6px 14px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    letter-spacing: 0.5px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    white-space: nowrap;
  }
  .track-toast.show { opacity: 1; transform: translateY(0); }

  .shake-hint {
    position: fixed;
    top: 72px;
    right: 18px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    z-index: 50;
    animation: hintFade 4s ease-in-out 2s forwards;
    opacity: 1;
  }

</style>

<script>
(function () {
  'use strict';

  // ===== 配置 =====

  // winnable 表示是否会真的被抽到

  ];

  // 抽奖概率：20% 奶茶 / 5% 烧烤 / 5% 蛋糕 / 70% 谢谢惠顾
  function drawType() {
    const r = Math.random() * 100;
    if (r < 20) return 'milktea';
    if (r < 25) return 'bbq';
    if (r < 30) return 'cake';
    return 'none';
  }

  // 中奖文案
  const RESULT_TEXTS = {
    milktea: {
      emoji: '🧋',
      title: '恭喜中奖！',
      prize: '一杯奶茶',
      msg: '宝贝运气爆棚～ 这杯奶茶我请！想喝什么直接告诉我，立刻安排～',

    },
  };

  const SWEET_PHRASES = [
    '献给我最爱的小可爱 💖 每天一次哟～',
    '宝贝今天也要开开心心 🌸',

    SWEET_PHRASES[Math.floor(Math.random() * SWEET_PHRASES.length)];

  // ===== 鼠标轨迹爱心 =====
  const TRAIL_ICONS = ['💖','💗','💕','✨','🌟','🌸'];
  let lastTrail = 0, lastX = 0, lastY = 0;
  document.addEventListener('mousemove', (e) => {
    const now = performance.now();
    if (now - lastTrail < 90) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    if (dx*dx + dy*dy < 25) return; // 鼠标几乎不动就不画
    lastTrail = now;
    lastX = e.clientX; lastY = e.clientY;
    const t = document.createElement('div');
    t.className = 'trail';
    t.textContent = TRAIL_ICONS[Math.floor(Math.random() * TRAIL_ICONS.length)];
    t.style.left = e.clientX + 'px';
    t.style.top = e.clientY + 'px';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1400);
  }, { passive: true });

  // ===== Konami 彩蛋：键盘输入 iloveyou =====
  const SECRET = 'iloveyou';
  let typed = '';
  document.addEventListener('keydown', (e) => {
    if (!/^[a-zA-Z]$/.test(e.key)) return;
    typed = (typed + e.key.toLowerCase()).slice(-SECRET.length);
    if (typed === SECRET) {
      typed = '';
      triggerLoveBoom();
    }
  });
  // ===== 情书库 =====
  const LOVE_LETTERS = [
    {
      title: '偷偷告诉你～',
      body: '亲爱的宝贝：<br>这个转盘上的每一个奖品，<br>在我心里你都已经拥有了 💖<br>无论中没中奖，<br>你都是我最大的幸运。<br><span style="float:right; margin-top:8px;">—— 永远爱你的我</span>',
    },
    {
      title: '一句小情话 💭',
      body: '你笑起来的样子，<br>是我私藏的壁纸 📸<br>每天看好多遍，都不腻。<br><span style="float:right; margin-top:8px;">—— 你的小迷弟</span>',
    },
    {
      title: '想对你说 🥰',
      body: '今天的你，一定要开开心心，<br>不开心也不准。<br>有事我顶着，<br>有委屈我抱着。<br><span style="float:right; margin-top:8px;">—— 你的小护盾 🛡</span>',
    },
    {
      title: '小心机告白 💘',
      body: '别人都说我变温柔了，<br>其实只有遇到你的时候才是。<br>剩下时间……还是那个臭脾气 😏<br><span style="float:right; margin-top:8px;">—— 只对你温柔</span>',
    },
    {
      title: '一个秘密 🤫',
      body: '我手机里有一个相册，<br>名字叫"宝贝"。<br>里面全是你的截图和偷拍。<br>嘘——别告诉别人 🤭<br><span style="float:right; margin-top:8px;">—— 你的小狗仔</span>',
    },
    {
      title: '认真说一句 💍',
      body: '认识你之后，<br>"以后"这两个字才有意义。<br>下辈子也想这样找到你。<br><span style="float:right; margin-top:8px;">—— 你的归宿</span>',
    },
    {
      title: '给小可爱 🍓',
      body: '你是我的小奶茶 🧋<br>是我的小蛋糕 🎂<br>是我的全世界 🌍<br>也是我每天起床的理由 ☀️<br><span style="float:right; margin-top:8px;">—— 离不开你的我</span>',
    },
  ];
  let letterIdx = -1;
  function showLetter(idx) {
    // 不连续显示同一封
    if (idx === undefined) {
      do { idx = Math.floor(Math.random() * LOVE_LETTERS.length); }
      while (idx === letterIdx && LOVE_LETTERS.length > 1);
    }
    letterIdx = idx;
    const L = LOVE_LETTERS[idx];
    document.getElementById('letterTitle').textContent = L.title;
    document.getElementById('letterBody').innerHTML = L.body;
    document.getElementById('loveLetter').classList.add('show');
  }

  // Logo 连点 5 次解锁情书
  let logoTaps = 0, logoTapTimer = null;
  document.querySelector('h1').addEventListener('click', () => {
    logoTaps++;
    clearTimeout(logoTapTimer);
    logoTapTimer = setTimeout(() => { logoTaps = 0; }, 1200);
    if (logoTaps >= 5) {
      logoTaps = 0;
      showLetter();
      playWin();
    }
  });

  // 长按 GO 按钮 1.2 秒也能解锁情书（仅未抽奖时）
  let pressTimer = null;
  function startPress() {
    if (spinBtn.disabled) return;
    clearTimeout(pressTimer);
    pressTimer = setTimeout(() => {
      pressTimer = 'fired';
      showLetter();
      playWin();
    }, 1200);
  }
  function cancelPress() {
    if (pressTimer === 'fired') { pressTimer = null; return true; } // 长按已触发，不要触发普通 click
    clearTimeout(pressTimer);
    pressTimer = null;
    return false;
  }
  // 这两个在 DOM 就绪后绑定 spinBtn（见下方初始化）

  function triggerLoveBoom() {
    const icons = ['💖','💗','💕','💞','💝','❤️','🌹','✨','🌟'];
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    for (let i = 0; i < 80; i++) {
      const b = document.createElement('div');
      b.className = 'boom';
      b.textContent = icons[Math.floor(Math.random() * icons.length)];
      const ang = Math.random() * Math.PI * 2;
      const dist = 200 + Math.random() * 400;
      b.style.left = cx + 'px';
      b.style.top = cy + 'px';
      b.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
      b.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
      b.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 3000);
    }
    playWin();
    setTimeout(() => showLetter(), 1200);
  }
  document.getElementById('closeLetterBtn').addEventListener('click', () => {
    document.getElementById('loveLetter').classList.remove('show');
  });
  document.getElementById('loveLetter').addEventListener('click', (e) => {
    if (e.target.id === 'loveLetter') e.currentTarget.classList.remove('show');
  });

  // ===== 初始化背景星星 =====
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 4 + 's';
    s.style.animationDuration = (3 + Math.random() * 4) + 's';
    stars.appendChild(s);
  }
  // 飘浮爱心
  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = ['💖','💗','💝','💕','💞','❤️','✨','🌸'][Math.floor(Math.random()*8)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (16 + Math.random() * 18) + 'px';
    h.style.animationDuration = (8 + Math.random() * 6) + 's';
    stars.appendChild(h);
    setTimeout(() => h.remove(), 14000);
  }
  setInterval(spawnHeart, 800);
  for (let i = 0; i < 6; i++) setTimeout(spawnHeart, i * 200);

  // ===== 偶发流星 =====
  function spawnShootingStar() {
    const wrap = document.createElement('div');
    wrap.className = 'ss-wrap';
    wrap.style.top = (Math.random() * 45) + 'vh';
    const angle = 14 + Math.random() * 16; // 14-30 度
    wrap.style.transform = `rotate(${angle}deg)`;
    const ss = document.createElement('div');
    ss.className = 'ss';
    ss.style.animationDuration = (1.1 + Math.random() * 0.6) + 's';
    wrap.appendChild(ss);
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 2200);
  }
  function scheduleNextStar() {
    setTimeout(() => {
      spawnShootingStar();
      scheduleNextStar();
    }, 7000 + Math.random() * 9000);
  }
  setTimeout(scheduleNextStar, 3000);

  // ===== 绘制转盘 (SVG) =====
  const wheelEl = document.getElementById('wheel');
  const N = SECTORS.length;
  const anglePer = 360 / N;
  const cx = 200, cy = 200, r = 200;

  function polar(angleDeg, radius) {
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) };
  }

  let svg = `<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">`;
  // 扇区
  for (let i = 0; i < N; i++) {
    const startA = i * anglePer - anglePer / 2;
    const endA = startA + anglePer;
    const p1 = polar(startA, r);
    const p2 = polar(endA, r);
    const largeArc = anglePer > 180 ? 1 : 0;
    const path = `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y} Z`;
    svg += `<path d="${path}" fill="${SECTORS[i].color}" stroke="#fff8d8" stroke-width="2"/>`;
  }
  // 分隔线高光
  for (let i = 0; i < N; i++) {
    const a = i * anglePer - anglePer / 2;
    const p = polar(a, r);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>`;
  }
  // 文字+图标
  for (let i = 0; i < N; i++) {
    const a = i * anglePer; // 扇区中心角度
    const tp = polar(a, r * 0.62);
    const ep = polar(a, r * 0.82);
    svg += `<g transform="rotate(${a} ${tp.x} ${tp.y})">
              <text x="${tp.x}" y="${tp.y}" font-size="20" text-anchor="middle" dominant-baseline="middle">${SECTORS[i].name}</text>
            </g>`;
    svg += `<g transform="rotate(${a} ${ep.x} ${ep.y})">
              <text x="${ep.x}" y="${ep.y}" font-size="32" text-anchor="middle" dominant-baseline="middle">${SECTORS[i].emoji}</text>
            </g>`;
  }
  // 中心装饰圈
  svg += `<circle cx="${cx}" cy="${cy}" r="50" fill="rgba(255,255,255,0.15)" stroke="#fff8d8" stroke-width="2"/>`;
  svg += `</svg>`;
  wheelEl.innerHTML = svg;

  // ===== 灯泡 =====
  const bulbs = document.getElementById('bulbs');
  const bulbCount = 24;
  for (let i = 0; i < bulbCount; i++) {
    const ang = (360 / bulbCount) * i;
    const b = document.createElement('div');
    b.className = 'bulb';
    b.style.transform = `rotate(${ang}deg) translate(calc(50% - 6px - 10px)) rotate(-${ang}deg)`;
    // 上面这种 transform-origin 0 0 的写法在 mobile 上容易乱，改用直接定位
    b.style.transform = '';
    b.style.left = `calc(50% + ${Math.cos((ang - 90) * Math.PI/180) * 48}% )`;
    b.style.top  = `calc(50% + ${Math.sin((ang - 90) * Math.PI/180) * 48}% )`;
    b.style.marginLeft = '-5px';
    b.style.marginTop  = '-5px';
    b.style.animationDelay = (i * 0.08) + 's';
    bulbs.appendChild(b);
  }

  // ===== 抽奖逻辑 =====
  const spinBtn = document.getElementById('spinBtn');
  const remainingEl = document.getElementById('remaining');
  const todayResultEl = document.getElementById('todayResult');
  const todayPrizeEl = document.getElementById('todayPrize');
  const hugBtn = document.getElementById('hugBtn');
  const modal = document.getElementById('modal');
  const countdownEl = document.getElementById('countdown');
  const cdNumEl = document.getElementById('cdNum');
  const milkteaMenu = document.getElementById('milkteaMenu');
  const bbqMenu = document.getElementById('bbqMenu');
  const cakeMenu = document.getElementById('cakeMenu');

  // 长按按钮解锁情书 —— 绑定 spinBtn 事件
  spinBtn.addEventListener('mousedown', startPress);
  spinBtn.addEventListener('touchstart', startPress, { passive: true });
  spinBtn.addEventListener('mouseup', cancelPress);
  spinBtn.addEventListener('mouseleave', cancelPress);
  spinBtn.addEventListener('touchend', cancelPress);
  spinBtn.addEventListener('touchcancel', cancelPress);
  const closeBtn = document.getElementById('closeBtn');
  const resultEmoji = document.getElementById('resultEmoji');
  const resultTitle = document.getElementById('resultTitle');
  const resultPrize = document.getElementById('resultPrize');
  const resultMsg = document.getElementById('resultMsg');

  let currentRotation = 0;
  let spinning = false;
  let userIp = null;
  let storageKey = null;

  // ===== 音效 (Web Audio API 合成) =====
  let audioCtx = null;
  let muted = localStorage.getItem('lottery_muted') === '1';
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('lottery_muted', muted ? '1' : '0');
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (!muted) ensureAudio();
  });
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTick() {
    if (muted) return;
    const ctx = ensureAudio(); if (!ctx) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.04);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.06);
  }
  function playWin() {
    if (muted) return;
    const ctx = ensureAudio(); if (!ctx) return;
    // 上扬琶音：C E G C 高八度
    const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
    notes.forEach((freq, i) => {
      const t0 = ctx.currentTime + i * 0.1;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.18, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.45);
    });
    // 同时来一组水晶音
    [1568, 2093].forEach((freq, i) => {
      const t0 = ctx.currentTime + 0.5 + i * 0.08;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.12, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.7);
    });
  }
  function playLose() {
    if (muted) return;
    const ctx = ensureAudio(); if (!ctx) return;
    // 下行三音：失落小号
    const notes = [392, 349.23, 293.66];
    notes.forEach((freq, i) => {
      const t0 = ctx.currentTime + i * 0.2;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.1, t0 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.5);
    });
  }

  // ===== 背景音乐：4 种风格，每次打开随机一个 =====
  let bgGain = null, bgFilter = null, bgInterval = null, bgNextTime = 0, bgChordIdx = 0;

  // —— 四种曲风的 schedule 函数。返回值是"下一段从多少秒后开始"。
  function scheduleDreamy(ctx, idx, t0, out) {
    const chords = [
      [261.63, 329.63, 392.00],   // C
      [220.00, 261.63, 329.63],   // Am
      [174.61, 220.00, 261.63],   // F
      [196.00, 246.94, 293.66],   // G
    ];
    const dur = 3.2;
    const chord = chords[idx % chords.length];
    chord.forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.6, t0 + 0.8);
      g.gain.setValueAtTime(0.6, t0 + dur - 0.6);
      g.gain.linearRampToValueAtTime(0, t0 + dur);
      o.connect(g).connect(out);
      o.start(t0); o.stop(t0 + dur + 0.1);
      if (i === 2) {
        const o2 = ctx.createOscillator(), g2 = ctx.createGain();
        o2.type = 'triangle'; o2.frequency.value = f * 2;
        g2.gain.setValueAtTime(0, t0 + 0.3);
        g2.gain.linearRampToValueAtTime(0.15, t0 + 0.5);
        g2.gain.exponentialRampToValueAtTime(0.001, t0 + 1.5);
        o2.connect(g2).connect(out);
        o2.start(t0 + 0.3); o2.stop(t0 + 1.6);
      }
    });
    return dur - 0.15;
  }

  function scheduleSweet(ctx, idx, t0, out) {
    // C - G - Am - F：经典甜蜜流行进行
    const chords = [
      [261.63, 329.63, 392.00],
      [196.00, 246.94, 293.66],
      [220.00, 261.63, 329.63],
      [174.61, 220.00, 261.63],
    ];
    const dur = 1.8;
    const chord = chords[idx % chords.length];
    // 软 pad
    chord.forEach(f => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.18, t0 + 0.12);
      g.gain.linearRampToValueAtTime(0, t0 + dur);
      o.connect(g).connect(out);
      o.start(t0); o.stop(t0 + dur + 0.05);
    });
    // 上方跳跃旋律（高八度琶音）
    const melody = [chord[0]*2, chord[2]*2, chord[1]*2, chord[2]*2];
    const noteDur = dur / melody.length;
    melody.forEach((f, i) => {
      const tn = t0 + i * noteDur;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0, tn);
      g.gain.linearRampToValueAtTime(0.22, tn + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, tn + noteDur * 0.92);
      o.connect(g).connect(out);
      o.start(tn); o.stop(tn + noteDur);
    });
    return dur - 0.05;
  }

  function scheduleLofi(ctx, idx, t0, out) {
    // Cmaj7 - Am7 - Dm7 - G7：经典爵士四和弦
    const chords = [
      [261.63, 329.63, 392.00, 493.88],
      [220.00, 261.63, 329.63, 392.00],
      [146.83, 174.61, 220.00, 261.63],
      [196.00, 246.94, 293.66, 349.23],
    ];
    const dur = 4.0;
    const chord = chords[idx % chords.length];
    // 低八度 bass
    const ob = ctx.createOscillator(), gb = ctx.createGain();
    ob.type = 'sine'; ob.frequency.value = chord[0] / 2;
    gb.gain.setValueAtTime(0, t0);
    gb.gain.linearRampToValueAtTime(0.42, t0 + 0.8);
    gb.gain.setValueAtTime(0.42, t0 + dur - 0.8);
    gb.gain.linearRampToValueAtTime(0, t0 + dur);
    ob.connect(gb).connect(out);
    ob.start(t0); ob.stop(t0 + dur + 0.1);
    // 上层和弦音（七度音稍弱）
    chord.forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      const target = i === chord.length - 1 ? 0.18 : 0.34;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(target, t0 + 1.2);
      g.gain.setValueAtTime(target, t0 + dur - 1.0);
      g.gain.linearRampToValueAtTime(0, t0 + dur);
      o.connect(g).connect(out);
      o.start(t0); o.stop(t0 + dur + 0.1);
    });
    return dur - 0.2;
  }

  function scheduleCN(ctx, idx, t0, out) {
    // 古风：C 持续低音 + 五声音阶拨弦
    const dur = 3.0;
    // 持续低音 drone
    const od = ctx.createOscillator(), gd = ctx.createGain();
    od.type = 'sine'; od.frequency.value = 130.81; // C3
    gd.gain.setValueAtTime(0, t0);
    gd.gain.linearRampToValueAtTime(0.22, t0 + 0.7);
    gd.gain.setValueAtTime(0.22, t0 + dur - 0.6);
    gd.gain.linearRampToValueAtTime(0, t0 + dur);
    od.connect(gd).connect(out);
    od.start(t0); od.stop(t0 + dur + 0.1);
    // 中段和声变化
    const midPads = [
      [261.63, 392.00],
      [293.66, 392.00],
      [261.63, 349.23],
      [196.00, 293.66],
    ];
    midPads[idx % midPads.length].forEach(f => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.14, t0 + 0.9);
      g.gain.setValueAtTime(0.14, t0 + dur - 0.6);
      g.gain.linearRampToValueAtTime(0, t0 + dur);
      o.connect(g).connect(out);
      o.start(t0); o.stop(t0 + dur + 0.1);
    });
    // 五声音阶拨弦旋律：C D E G A
    const pent = [523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33];
    const noteCount = 4;
    const noteDur = dur / noteCount;
    for (let i = 0; i < noteCount; i++) {
      const f = pent[(idx * noteCount + i) % pent.length];
      const tn = t0 + i * noteDur;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0, tn);
      g.gain.linearRampToValueAtTime(0.24, tn + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, tn + noteDur * 0.95);
      o.connect(g).connect(out);
      o.start(tn); o.stop(tn + noteDur);
    }
    return dur - 0.15;
  }

  const TRACKS = [
    { key: 'dreamy', name: '🌙 梦境',      filter: 900,  gain: 0.045, schedule: scheduleDreamy },
    { key: 'sweet',  name: '💕 甜蜜跳跳',  filter: 1800, gain: 0.038, schedule: scheduleSweet  },
    { key: 'lofi',   name: '☕ 慵懒 Lo-Fi', filter: 650,  gain: 0.055, schedule: scheduleLofi   },
    { key: 'cn',     name: '🏮 古风小调',  filter: 1400, gain: 0.04,  schedule: scheduleCN     },
  ];

  // 每次打开页面随机一首（避开上次那首）
  const currentTrack = (function pickTrack() {
    const last = localStorage.getItem('lottery_last_track');
    const pool = TRACKS.filter(t => t.key !== last);
    const t = (pool.length ? pool : TRACKS)[Math.floor(Math.random() * (pool.length || TRACKS.length))];
    localStorage.setItem('lottery_last_track', t.key);
    return t;
  })();

  // 顶部短暂提示曲目名
  function showTrackToast(name) {
    let t = document.getElementById('trackToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'trackToast';
      t.className = 'track-toast';
      document.body.appendChild(t);
    }
    t.textContent = '♪ ' + name;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  let musicOn = localStorage.getItem('lottery_music') === '1';
  const musicBtn = document.getElementById('musicBtn');
  musicBtn.title = '背景音乐：' + currentTrack.name;
  if (musicOn) musicBtn.classList.add('on');
  musicBtn.addEventListener('click', () => {
    musicOn = !musicOn;
    localStorage.setItem('lottery_music', musicOn ? '1' : '0');
    musicBtn.classList.toggle('on', musicOn);
    if (musicOn) startBgMusic(); else stopBgMusic();
  });

  function startBgMusic() {
    const ctx = ensureAudio(); if (!ctx || bgGain) return;
    bgGain = ctx.createGain();
    bgGain.gain.value = 0;
    bgGain.gain.linearRampToValueAtTime(currentTrack.gain, ctx.currentTime + 1.2);
    bgFilter = ctx.createBiquadFilter();
    bgFilter.type = 'lowpass';
    bgFilter.frequency.value = currentTrack.filter;
    bgFilter.Q.value = 0.7;
    bgFilter.connect(bgGain).connect(ctx.destination);
    bgNextTime = ctx.currentTime + 0.1;
    bgChordIdx = 0;
    function step() {
      if (!bgGain) return;
      const advance = currentTrack.schedule(ctx, bgChordIdx, bgNextTime, bgFilter);
      bgNextTime += advance;
      bgChordIdx++;
    }
    for (let i = 0; i < 4; i++) step();
    bgInterval = setInterval(() => {
      if (!bgGain) return;
      if (bgNextTime - ctx.currentTime < 4) step();
    }, 1000);
    showTrackToast(currentTrack.name);
  }
  function stopBgMusic() {
    if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
    if (bgGain && audioCtx) {
      bgGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      setTimeout(() => {
        try { bgGain.disconnect(); bgFilter.disconnect(); } catch (e) {}
        bgGain = null; bgFilter = null;
      }, 500);
    }
  }
  // 首次用户交互后，若音乐开关是开的就自动开始（浏览器要求用户手势才能启动 audio）
  function autoStartMusic() {
    if (musicOn) startBgMusic();
    document.removeEventListener('click', autoStartMusic);
    document.removeEventListener('keydown', autoStartMusic);
    document.removeEventListener('touchstart', autoStartMusic);
  }
  document.addEventListener('click', autoStartMusic);
  document.addEventListener('keydown', autoStartMusic);
  document.addEventListener('touchstart', autoStartMusic, { passive: true });

  // ===== 摇一摇抽奖（移动端） =====
  const SHAKE_THRESHOLD = 18;
  let lastShakeT = 0;
  function onMotion(e) {
    const a = e.accelerationIncludingGravity || e.acceleration;
    if (!a) return;
    const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
    if (mag > SHAKE_THRESHOLD && performance.now() - lastShakeT > 1500) {
      lastShakeT = performance.now();
      if (!spinning && !spinBtn.disabled) spin();
    }
  }
  if (typeof DeviceMotionEvent !== 'undefined') {
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      document.getElementById('shakeHint').style.display = '';
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        // iOS 13+ 需要权限，第一次点击时申请
        const requestOnce = () => {
          DeviceMotionEvent.requestPermission().then(s => {
            if (s === 'granted') window.addEventListener('devicemotion', onMotion);
          }).catch(() => {});
          document.removeEventListener('click', requestOnce);
        };
        document.addEventListener('click', requestOnce);
      } else {
        window.addEventListener('devicemotion', onMotion);
      }
    }
  }

  // 指针被扇区边缘拨一下的回弹动画
  const pointerEl = document.querySelector('.pointer');
  function kickPointer() {
    if (!pointerEl) return;
    pointerEl.classList.remove('kick');
    // 强制 reflow 让动画重新触发
    void pointerEl.offsetWidth;
    pointerEl.classList.add('kick');
  }

  // 根据 wheel 实际 transform 矩阵实时触发滴答 + 指针拨动
  function startTickLoop(durationMs) {
    const startTime = performance.now();
    let lastIdx = -999;
    function frame() {
      const elapsed = performance.now() - startTime;
      if (elapsed > durationMs + 80) return;
      const m = getComputedStyle(wheelEl).transform;
      let angle = 0;
      if (m && m.startsWith('matrix')) {
        const v = m.match(/matrix\(([^)]+)\)/);
        if (v) {
          const p = v[1].split(',').map(parseFloat);
          angle = Math.atan2(p[1], p[0]) * 180 / Math.PI;
        }
      }
      const norm = ((angle % 360) + 360) % 360;
      const idx = Math.floor(norm / anglePer);
      if (idx !== lastIdx) {
        lastIdx = idx;
        playTick();
        kickPointer();
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // 今日日期 key
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
  }

  // 获取 IP
  async function fetchIp() {
    const apis = [
      'https://api.ipify.org?format=json',
      'https://ipapi.co/json/',
      'https://api64.ipify.org?format=json',
    ];
    for (const api of apis) {
      try {
        const r = await fetch(api, { cache: 'no-store' });
        if (!r.ok) continue;
        const j = await r.json();
        if (j.ip) return j.ip;
      } catch (e) { /* try next */ }
    }
    return 'unknown';
  }

  function getRecord() {
    try { return JSON.parse(localStorage.getItem(storageKey) || 'null'); } catch (e) { return null; }
  }
  function saveRecord(type) {
    localStorage.setItem(storageKey, JSON.stringify({
      type, date: todayKey(), at: Date.now()
    }));
  }

  async function init() {
    spinBtn.disabled = true;
    spinBtn.textContent = '...';
    userIp = await fetchIp();
    storageKey = `lottery_${userIp}_${todayKey()}`;
    const rec = getRecord();
    if (rec && rec.date === todayKey()) {
      remainingEl.textContent = '0';
      spinBtn.disabled = true;
      spinBtn.textContent = '明天再来';
      showTodayBadge(rec.type);
      // 直接展示已抽结果
      setTimeout(() => showResult(rec.type, true), 400);
    } else {
      remainingEl.textContent = '1';
      spinBtn.disabled = false;
      spinBtn.textContent = 'GO!';
    }
  }

  function showTodayBadge(type) {
    const cfg = RESULT_TEXTS[type] || RESULT_TEXTS.none;
    todayPrizeEl.textContent = cfg.emoji + ' ' + cfg.prize;
    todayResultEl.style.display = '';
  }

  // 根据中奖类型找到一个对应的可中奖扇区索引
  function pickSectorIndex(type) {
    const candidates = [];
    SECTORS.forEach((s, i) => { if (s.winnable && s.type === type) candidates.push(i); });
    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  function spin() {
    if (spinning) return;
    const rec = getRecord();
    if (rec && rec.date === todayKey()) {
      showResult(rec.type, true);
      return;
    }
    spinning = true;
    spinBtn.disabled = true;
    spinBtn.textContent = '抽奖中';

    // 3-2-1 倒计时
    runCountdown(() => doSpin());
  }

  function runCountdown(onDone) {
    countdownEl.classList.add('show');
    let n = 3;
    const tick = () => {
      cdNumEl.textContent = n > 0 ? n : 'GO!';
      cdNumEl.style.animation = 'none';
      void cdNumEl.offsetWidth; // reflow
      cdNumEl.style.animation = '';
      playTick();
      if (n === 0) {
        setTimeout(() => {
          countdownEl.classList.remove('show');
          onDone();
        }, 600);
      } else {
        n--;
        setTimeout(tick, 1000);
      }
    };
    tick();
  }

  function doSpin() {
    const type = drawType();
    const idx = pickSectorIndex(type);
    // 目标：让扇区 idx 的中心对准顶部指针（0 度向上）
    // 当转盘旋转角 R 时，扇区中心实际角度 = idx*anglePer + R （顺时针）
    // 想让它停在 0（顶部），即 R = -idx*anglePer + 360*k + 随机偏移
    const targetSectorAngle = idx * anglePer;
    const baseRounds = 6 + Math.floor(Math.random() * 3); // 6~8 圈
    // 在扇区内随机偏移一点，避免每次都正中
    const jitter = (Math.random() - 0.5) * (anglePer * 0.7);
    const finalAngle = baseRounds * 360 - targetSectorAngle + jitter;

    // 累计旋转，保证视觉上一直顺时针多圈
    const next = currentRotation + (360 - (currentRotation % 360)) + finalAngle;
    currentRotation = next;
    wheelEl.style.transform = `rotate(${next}deg)`;
    ensureAudio();
    startTickLoop(6000);

    setTimeout(() => {
      saveRecord(type);
      remainingEl.textContent = '0';
      spinBtn.textContent = '明天再来';
      showTodayBadge(type);
      showResult(type, false);
      spinning = false;
    }, 6100);
  }

  function showResult(type, already) {
    const cfg = RESULT_TEXTS[type] || RESULT_TEXTS.none;
    resultEmoji.textContent = cfg.emoji;
    resultTitle.textContent = already ? '今日已抽过哦～' : cfg.title;
    resultPrize.textContent = cfg.prize;
    resultMsg.textContent = already
      ? `今天已经抽过啦，结果是「${cfg.prize}」。明天再来玩吧～ 💕`
      : cfg.msg;
    hugBtn.style.display = (type === 'none') ? '' : 'none';
    // 二级菜单：奶茶/烧烤/蛋糕 才显示
    milkteaMenu.style.display = (type === 'milktea') ? '' : 'none';
    bbqMenu.style.display     = (type === 'bbq')     ? '' : 'none';
    cakeMenu.style.display    = (type === 'cake')    ? '' : 'none';
    if (type === 'milktea') renderMilktea();
    if (type === 'bbq')     renderBbq();
    if (type === 'cake')    renderCake();
    modal.classList.add('show');
    if (!already) {
      if (type === 'none') playLose();
      else { playWin(); confettiBoom(); }
    }
  }

  // ===== 二级选项 chips =====
  const MILKTEA_OPTIONS = ['喜茶','奈雪','一点点','蜜雪','CoCo','茶颜悦色','古茗','沪上阿姨','霸王茶姬'];
  const BBQ_OPTIONS     = ['🍗 烤翅','🥩 五花肉','🌶 辣翅','🍖 烤肉串','🥬 韭菜','🍄 金针菇','🥔 烤土豆','🌽 玉米','🥖 烤馒头','🦐 烤虾','🫒 毛豆','🦪 生蚝'];
  const CAKE_OPTIONS    = ['🍓 草莓','🍫 巧克力','🧀 芝士','🍵 抹茶','🍑 水蜜桃','🥭 芒果','🥥 椰子','🍮 焦糖','🍌 香蕉'];

  // 单选 chip 渲染（奶茶/蛋糕）
  function renderSingle(wrapId, savedKey, defaults, savedSuffix, customKey) {
    const wrap = document.getElementById(wrapId);
    const customs = JSON.parse(localStorage.getItem(customKey) || '[]');
    const saved = JSON.parse(localStorage.getItem(savedKey) || 'null');
    const all = defaults.concat(customs);
    wrap.innerHTML =
      all.map(o => `<span class="chip ${saved === o ? 'selected' : ''}" data-v="${o}">${o}</span>`).join('') +
      `<div class="chip-input-wrap">
         <input type="text" placeholder="想要别的？打字..." maxlength="20"/>
         <button>添加</button>
       </div>
       <div class="chip-saved">${saved ? `已记下：${saved} ${savedSuffix}` : ''}</div>`;
    const savedEl = wrap.querySelector('.chip-saved');
    const select = (v, alreadyChipEl) => {
      localStorage.setItem(savedKey, JSON.stringify(v));
      wrap.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
      if (alreadyChipEl) alreadyChipEl.classList.add('selected');
      savedEl.textContent = `已记下：${v} ${savedSuffix}`;
      playTick();
    };
    wrap.querySelectorAll('.chip').forEach(c => {
      c.addEventListener('click', () => select(c.dataset.v, c));
    });
    const input = wrap.querySelector('input');
    const addBtn = wrap.querySelector('button');
    const addCustom = () => {
      const v = input.value.trim();
      if (!v) return;
      // 已存在就直接选
      const existing = Array.from(wrap.querySelectorAll('.chip')).find(c => c.dataset.v === v);
      if (existing) { select(v, existing); input.value = ''; return; }
      // 保存到自定义列表
      const next = customs.concat(v);
      localStorage.setItem(customKey, JSON.stringify(next));
      input.value = '';
      // 重新渲染（保留选中 v）
      localStorage.setItem(savedKey, JSON.stringify(v));
      renderSingle(wrapId, savedKey, defaults, savedSuffix, customKey);
    };
    addBtn.addEventListener('click', addCustom);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } });
  }
  function renderMilktea() {
    renderSingle('milkteaChips', 'pick_milktea', MILKTEA_OPTIONS, '✅ 小宝已收到～', 'custom_milktea');
  }
  function renderCake() {
    renderSingle('cakeChips', 'pick_cake', CAKE_OPTIONS, '✅ 小宝已收到～', 'custom_cake');
  }
  // 多选 chip 渲染（烧烤）
  function renderBbq() {
    const wrap = document.getElementById('bbqChips');
    const customs = JSON.parse(localStorage.getItem('custom_bbq') || '[]');
    const saved = JSON.parse(localStorage.getItem('pick_bbq') || '[]');
    const set = new Set(saved);
    const all = BBQ_OPTIONS.concat(customs);
    wrap.innerHTML =
      all.map(o => `<span class="chip ${set.has(o) ? 'selected' : ''}" data-v="${o}">${o}</span>`).join('') +
      `<div class="chip-input-wrap">
         <input type="text" placeholder="想吃别的？打字..." maxlength="20"/>
         <button>添加</button>
       </div>
       <div class="chip-saved">${saved.length ? `已记下 ${saved.length} 样 ✅` : ''}</div>`;
    const savedEl = wrap.querySelector('.chip-saved');
    const flush = () => {
      const arr = Array.from(set);
      localStorage.setItem('pick_bbq', JSON.stringify(arr));
      savedEl.textContent = arr.length ? `已记下 ${arr.length} 样 ✅` : '';
    };
    wrap.querySelectorAll('.chip').forEach(c => {
      c.addEventListener('click', () => {
        const v = c.dataset.v;
        if (set.has(v)) { set.delete(v); c.classList.remove('selected'); }
        else { set.add(v); c.classList.add('selected'); }
        flush();
        playTick();
      });
    });
    const input = wrap.querySelector('input');
    const addBtn = wrap.querySelector('button');
    const addCustom = () => {
      const v = input.value.trim();
      if (!v) return;
      const existing = Array.from(wrap.querySelectorAll('.chip')).find(c => c.dataset.v === v);
      if (existing) {
        if (!set.has(v)) { set.add(v); existing.classList.add('selected'); flush(); }
        input.value = '';
        return;
      }
      const next = customs.concat(v);
      localStorage.setItem('custom_bbq', JSON.stringify(next));
      set.add(v);
      localStorage.setItem('pick_bbq', JSON.stringify(Array.from(set)));
      input.value = '';
      renderBbq();
    };
    addBtn.addEventListener('click', addCustom);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addCustom(); } });
  }

  hugBtn.addEventListener('click', () => {
    // 在弹窗附近喷一波爱心
    const rect = hugBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const icons = ['🤗','💖','💗','🥰','💕','✨'];
    for (let i = 0; i < 30; i++) {
      const b = document.createElement('div');
      b.className = 'boom';
      b.textContent = icons[Math.floor(Math.random() * icons.length)];
      const ang = -Math.PI/2 + (Math.random() - 0.5) * Math.PI; // 向上扇形扩散
      const dist = 80 + Math.random() * 180;
      b.style.left = cx + 'px';
      b.style.top = cy + 'px';
      b.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
      b.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
      b.style.animationDelay = (Math.random() * 0.2) + 's';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 2400);
    }
    playWin();
    hugBtn.textContent = '抱住啦 🥰';
    setTimeout(() => { hugBtn.textContent = '🥺 再抱抱'; }, 1500);
  });

  function confettiBoom() {
    const colors = ['#ffd86b', '#ff6fa8', '#c19bff', '#5ec8ff', '#a3e635', '#fff'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.6) + 's';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }

  spinBtn.addEventListener('click', () => {
    // 如果是长按触发的，跳过 click
    if (cancelPress()) return;
    spin();
  });
  closeBtn.addEventListener('click', () => modal.classList.remove('show'));
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.classList.remove('show');
  });

  init();
})();
</script>
</body>
</html>
